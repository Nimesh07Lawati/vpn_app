name: vpn_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^17.2.3
  flutter_riverpod: ^3.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_flavorizr: ^2.4.2 
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5

flutter:
  uses-material-design: true
  assets:
    - assets/app_images/
    - assets/app_icons/

# 👇 flavorizr config is a TOP-LEVEL block, completely separate
flavorizr:
  app:
    android:
      flavorDimensions: "env"
  flavors:
    dev:
      app:
        name: "VPN Dev"
      android:
        applicationId: "com.yourcompany.vpnapp.dev"
      ios:
        bundleId: "com.yourcompany.vpnapp.dev"
    staging:
      app:
        name: "VPN Staging"
      android:
        applicationId: "com.yourcompany.vpnapp.staging"
      ios:
        bundleId: "com.yourcompany.vpnapp.staging"
    prod:
      app:
        name: "VPN"
      android:
        applicationId: "com.yourcompany.vpnapp"
      ios:
        bundleId: "com.yourcompany.vpnapp"